rdens, NY 11364","short":"76-08 Springfield Blvd","lat":40.739467223674026,"lng":-73.7502561063387,"rot":0,"flipX":false,"flipY":false,"flat_sf":6909,"total_sqft":7724,"pitched_sqft":7724,"eave_lf":648.0,"pitch":"6/12","bucket":"medium","polygon_ft":[[-20.899411974041104,19.151587256549508],[-83.0972576703519,57.35414645826018],[-69.19866883119009,80.4937143822175],[-9.485923641403586,43.92053711638831],[-2.726137672398827,55.25978502508876],[50.77385625107693,22.332203313641934],[45.260527926067866,14.103238428830366],[65.92281012496795,0.6696290869584929],[33.3117270629369,-52.287237524556794],[16.37318823308975,-40.95189700658987],[-14.9211041517421,-92.58806555017242],[-37.82622863168768,-78.61132889634005],[-5.445681622934858,-24.876891528852536],[12.02426234667224,-35.98169599354127],[34.464407329327884,0.9822203456407759],[-14.530365078389224,31.03005508647695]]},{"id":"76-24 Springfield Blvd, Oakland Gardens, NY 11364, USA.pdf","address":"76-24 Springfield Blvd, Oakland Gardens, NY 11364","short":"76-24 Springfield Blvd","lat":40.73906950914676,"lng":-73.75011907196688,"rot":0,"flipX":false,"flipY":false,"flat_sf":9434,"total_sqft":10547,"pitched_sqft":10547,"eave_lf":865.0,"pitch":"6/12","bucket":"large","polygon_ft":[[-126.01708199466788,-60.73527966816779],[-148.21059265077122,-46.91316867279075],[-84.24069716925064,59.92449410843434],[-63.02695032529156,46.97052826305854],[-51.38140324170338,66.01391223201452],[9.866237090884715,28.150381618388636],[1.0545638183720185,13.794981459439397],[73.29664237204734,-30.815277177053332],[103.10502620101879,20.20685349587721],[126.47053280962382,6.260721764785718],[94.62200787814943,-46.807751047433456],[80.69447925741514,-37.34496891241985],[68.29240568596873,-59.426860906380185],[-14.832492426650832,-7.8590389963060066],[-5.797581829852129,6.5025621994289144],[-63.895095475292806,42.077910239122936]]}];
const STATS = {"count": 52, "flat_sf": 387272, "pitched_sqft": 432968, "eave_lf": 35929.0};

const fmt = n => n.toLocaleString();
const eavesTotal = STATS.eave_lf;
document.getElementById('s-count').textContent = STATS.count;
document.getElementById('s-flat').textContent  = fmt(STATS.flat_sf) + ' sf';
document.getElementById('s-pitch').textContent = fmt(STATS.pitched_sqft) + ' sf';
document.getElementById('s-eaves').textContent = fmt(eavesTotal) + ' lf';

const colorFor = b => b.bucket === 'small' ? '#2e9e5b' : b.bucket === 'medium' ? '#d8a82a' : '#e35a3a';
const radiusFor = b => 6 + Math.sqrt(b.flat_sf) / 18;
const FT_PER_DEG_LAT = 364000;
const ftPerDegLng = lat => 364000 * Math.cos(lat * Math.PI/180);

function polygonLatLng(b){
  const cos = Math.cos(b.rot * Math.PI/180);
  const sin = Math.sin(b.rot * Math.PI/180);
  const ftLng = ftPerDegLng(b.lat);
  return b.polygon_ft.map(([x,y]) => {
    let xx = b.flipX ? -x : x;
    let yy = b.flipY ? -y : y;
    const rx = xx*cos - yy*sin;
    const ry = xx*sin + yy*cos;
    return [b.lat - ry / FT_PER_DEG_LAT, b.lng + rx / ftLng];
  });
}

// Map setup
const lats = BUILDINGS.map(b => b.lat), lngs = BUILDINGS.map(b => b.lng);
const center = [(Math.min(...lats)+Math.max(...lats))/2, (Math.min(...lngs)+Math.max(...lngs))/2];
const map = L.map('map', { zoomControl: true }).setView(center, 17);

const sat = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 21, maxNativeZoom: 19, attribution: 'Imagery &copy; Esri' }
).addTo(map);
const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 19, attribution: '&copy; OpenStreetMap' });
const streetLabels = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19, opacity: 0.92 }
).addTo(map);
const placeLabels = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19, opacity: 0.92 }
).addTo(map);

const featureLayer = L.layerGroup().addTo(map);
let showAddr = true, showSf = true, currentBase = 'sat', streetsOn = true;
let activeFilter = 'all', activeId = null;
const featureByIdx = new Map();

function popupHtml(b){
  return `<div>
    <div class="pop-head">${b.short}</div>
    <div class="pop-addr">${b.address}</div>
    <table>
      <tr class="hl"><td class="k">Flat SF (0 pitch)</td><td class="v">${fmt(b.flat_sf)} sf</td></tr>
      <tr><td class="k">Pitched (Oded)</td><td class="v">${fmt(b.pitched_sqft)} sf</td></tr>
      <tr><td class="k">Total eave</td><td class="v">${fmt(b.eave_lf)} lf</td></tr>
      <tr><td class="k">Pitch</td><td class="v">${b.pitch || '—'}</td></tr>
    </table></div>`;
}

function buildFeature(b, idx){
  const color = colorFor(b);
  const isPoly = b.polygon_ft && b.polygon_ft.length >= 3;
  const feat = isPoly
    ? L.polygon(polygonLatLng(b), { color: '#fff', weight: 1.5, opacity: 0.9, fillColor: color, fillOpacity: 0.6 })
    : L.circleMarker([b.lat, b.lng], { radius: radiusFor(b), color: '#fff', weight: 1.5, fillColor: color, fillOpacity: 0.85 });
  feat.bindPopup(popupHtml(b));
  const labelParts = [];
  if (showAddr) labelParts.push(b.short);
  if (showSf) labelParts.push(`${fmt(b.flat_sf)} SF`);
  if (labelParts.length) {
    feat.bindTooltip(labelParts.join('<br>'), {
      permanent: true, direction: 'center', className: 'bldg-label', opacity: 1,
    });
  }
  feat._isPoly = isPoly; feat._bldg = b; feat._idx = idx;
  feat.on('click', () => highlightListItem(b.id));
  if (isPoly) {
    feat.on('mouseover', () => feat.setStyle({ weight: 2.5, color: '#00c8dc' }));
    feat.on('mouseout',  () => feat.setStyle({ weight: 1.5, color: '#fff' }));
  }
  return feat;
}

function rebuild(){
  featureLayer.clearLayers();
  featureByIdx.clear();
  BUILDINGS.forEach((b, i) => {
    if (activeFilter !== 'all' && b.bucket !== activeFilter) return;
    const f = buildFeature(b, i);
    f.addTo(featureLayer);
    featureByIdx.set(b.id, f);
  });
}

function renderList(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  const items = BUILDINGS.map((b,i)=>({b,i}))
    .filter(({b})=> activeFilter==='all' || b.bucket===activeFilter)
    .sort((a,b)=> b.b.flat_sf - a.b.flat_sf);
  for (const {b} of items){
    const el = document.createElement('div');
    el.className = 'item' + (activeId===b.id ? ' active' : '');
    el.dataset.id = b.id;
    el.innerHTML = `<span class="swatch ${b.bucket}"></span><span class="addr">${b.short}</span><span class="sf">${fmt(b.flat_sf)} sf</span>`;
    el.addEventListener('click', () => {
      map.flyTo([b.lat, b.lng], 19, { duration: 0.5 });
      const f = featureByIdx.get(b.id);
      if (f) f.openPopup();
      highlightListItem(b.id);
    });
    list.appendChild(el);
  }
}
function highlightListItem(id){
  activeId = id;
  document.querySelectorAll('.item').forEach(el => el.classList.toggle('active', el.dataset.id===id));
}

function applyFilter(f){
  activeFilter = f;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter===f));
  rebuild(); renderList();
}
document.querySelectorAll('[data-filter]').forEach(b => b.addEventListener('click', () => applyFilter(b.dataset.filter)));

document.getElementById('toggle-addr').addEventListener('click', e => {
  showAddr = !showAddr; e.target.classList.toggle('active', showAddr); rebuild();
});
document.getElementById('toggle-sf').addEventListener('click', e => {
  showSf = !showSf; e.target.classList.toggle('active', showSf); rebuild();
});
document.getElementById('toggle-streets').addEventListener('click', e => {
  streetsOn = !streetsOn;
  e.target.classList.toggle('active', streetsOn);
  if (streetsOn && currentBase === 'sat') { streetLabels.addTo(map); placeLabels.addTo(map); }
  else { map.removeLayer(streetLabels); map.removeLayer(placeLabels); }
});
document.getElementById('toggle-base').addEventListener('click', e => {
  if (currentBase === 'sat') {
    map.removeLayer(sat); street.addTo(map); currentBase = 'street'; e.target.textContent = 'Street';
    map.removeLayer(streetLabels); map.removeLayer(placeLabels);
  } else {
    map.removeLayer(street); sat.addTo(map); currentBase = 'sat'; e.target.textContent = 'Satellite';
    if (streetsOn){ streetLabels.addTo(map); placeLabels.addTo(map); }
  }
});

applyFilter('all');
map.fitBounds(L.latLngBounds(BUILDINGS.map(b => [b.lat, b.lng])).pad(0.15));
</script>
